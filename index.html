<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Шерали Абдусадиков</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
html{scroll-behavior:smooth}

body{
margin:0;
font-family:Arial;
background:#050814;
color:white;
overflow-x:hidden;
}

/* VIDEO */
.video-bg{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-1;
filter:brightness(0.35);
}

/* HERO */
.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
position:relative;
}

.name{
font-size:5.5rem;
font-weight:900;
text-transform:uppercase;
text-shadow:0 0 20px #4da3ff,0 0 60px #1d4ed8;
animation:fade 1.5s ease;
}

.sub{
color:#9bbcff;
font-size:1.2rem;
margin-top:10px;
animation:fade 2s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(30px)}
to{opacity:1;transform:translateY(0)}
}

/* BUTTON */
.btn-main{
margin-top:25px;
padding:12px 35px;
border-radius:30px;
background:#1d4ed8;
border:none;
color:white;
transition:.3s;
}

.btn-main:hover{
transform:scale(1.08);
box-shadow:0 0 20px #1d4ed8;
}

/* PLAYER CARD */
.card-player{
margin-top:20px;
padding:20px;
border-radius:18px;
background:rgba(10,20,50,0.7);
border:1px solid #1d4ed8;
backdrop-filter:blur(10px);
display:inline-block;
}

.rating{
font-size:3rem;
font-weight:900;
color:#4da3ff;
text-shadow:0 0 20px #1d4ed8;
}

.stats-mini{
display:flex;
gap:12px;
justify-content:center;
font-size:12px;
color:#cdd6ff;
margin-top:10px;
}

/* STATS */
.stats{
padding:90px 0;
background:#070b1c;
}

.cardx{
background:#0b122b;
border:1px solid #1d4ed8;
border-radius:18px;
padding:30px;
text-align:center;
transition:.3s;
}

.cardx:hover{
transform:translateY(-10px);
box-shadow:0 0 25px #1d4ed8;
}

.num{
font-size:3rem;
font-weight:bold;
color:#4da3ff;
}

/* GALLERY */
.gallery{
padding:80px 0;
}

.gallery img{
width:100%;
height:260px;
object-fit:cover;
border-radius:15px;
transition:.3s;
}

.gallery img:hover{
transform:scale(1.08);
filter:brightness(1.2);
}

footer{
text-align:center;
padding:30px;
color:#777;
}
</style>
</head>

<body>

<!-- VIDEO -->
<video autoplay muted loop class="video-bg">
<source src="https://cdn.coverr.co/videos/coverr-football-stadium-5432/1080p.mp4">
</video>

<!-- HERO -->
<section class="hero">
<div>
<h1 class="name">ШЕРАЛИ<br>АБДУСАДИКОВ</h1>
<p class="sub">⚽ Football Player • Speed • Skill • Future Star</p>



<br>

<a href="about.html" class="btn btn-main">О нем</a>
</div>
</section>

<!-- STATS -->
<section class="stats">
<div class="container">
<div class="row g-4 text-center">

<div class="col-md-4">
<div class="cardx">
<div class="num counter" data-target="300">0</div>
<p>Голов</p>
</div>
</div>

<div class="col-md-4">
<div class="cardx">
<div class="num counter" data-target="500">0</div>
<p>Ассистов</p>
</div>
</div>

<div class="col-md-4">
<div class="cardx">
<div class="num counter" data-target="100">0</div>
<p>Матчей</p>
</div>
</div>

</div>
</div>
</section>

<!-- GALLERY -->
<section class="gallery">
<div class="container">
<h2 class="text-center mb-5">Галерея</h2>

<div class="row g-4">
<div class="col-md-4"><img src="photo_2026-06-20_20-20-52.jpg"></div>
<div class="col-md-4"><img src="photo_2026-06-20_20-21-07.jpg"></div>
<div class="col-md-4"><img src="photo_2026-06-20_20-21-25.jpg"></div>
</div>
</div>
</section>

<footer>
© 2026 Авторские права не продаются made by D
</footer>

<script>
const counters=document.querySelectorAll(".counter");

counters.forEach(c=>{
let target=+c.dataset.target;
let count=0;

let step=setInterval(()=>{
count++;
c.innerText=count;
if(count>=target) clearInterval(step);
},40);
});
</script>

</body>
</html>
